<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 モチベキャンパス</title>
    <style>
        /* 全体のデザイン設定 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #4a5568; margin-bottom: 25px; }
        .app-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 250px; }
        .card h2 { margin-top: 0; color: #4c51bf; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        
        /* 共通入力フォームやボタン */
        input[type="text"], input[type="date"], textarea, select { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        .btn { background-color: #4c51bf; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background-color: #434190; }
        .btn-small { padding: 5px 10px; width: auto; font-size: 0.9em; }
        
        /* 課題リスト */
        .task-item { background: #f7fafc; padding: 10px; border-radius: 6px; margin-top: 8px; border-left: 4px solid #e53e3e; display: flex; justify-content: space-between; align-items: center; }
        .btn-done { background-color: #38a169; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .subject-badge { background-color: #e2e8f0; color: #4a5568; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; font-weight: bold; }
        
        /* 時間割テーブル */
        .timetable { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        .timetable th, .timetable td { border: 1px solid #cbd5e0; text-align: center; padding: 0; }
        .timetable th { background-color: #edf2f7; padding: 8px 0; font-size: 0.9em; color: #4a5568; }
        .timetable td input { width: 100%; height: 100%; border: none; padding: 12px 4px; text-align: center; box-sizing: border-box; font-size: 0.9em; background: transparent; margin: 0; border-radius: 0; }
        .timetable td input:focus { outline: 2px solid #4c51bf; background: #fff; position: relative; z-index: 1; }
        .timetable th:first-child { width: 30px; }

        /* --- 新規：月間カレンダーのデザイン --- */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header h3 { margin: 0; color: #2d3748; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #cbd5e0; border: 1px solid #cbd5e0; border-radius: 6px; overflow: hidden; }
        .cal-head { background-color: #edf2f7; text-align: center; padding: 8px 0; font-weight: bold; font-size: 0.9em; color: #4a5568; }
        .cal-head:first-child { color: #e53e3e; } /* 日曜日を赤く */
        .cal-head:last-child { color: #3182ce; } /* 土曜日を青く */
        .cal-day { background-color: white; min-height: 80px; padding: 5px; box-sizing: border-box; }
        .cal-day-empty { background-color: #f7fafc; }
        .cal-date-num { font-size: 0.85em; color: #718096; margin-bottom: 5px; }
        .cal-task-label { background-color: #fed7d7; color: #c53030; font-size: 0.75em; padding: 2px 4px; border-radius: 3px; margin-bottom: 3px; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <h1>🎨 モチベキャンパス</h1>

    <div class="app-container">

        <div class="card" style="grid-column: span 2;">
            <h2>📅 大学の時間割</h2>
            <table class="timetable">
                <thead>
                    <tr><th></th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th></tr>
                </thead>
                <tbody id="timetableBody"></tbody>
            </table>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>👀 月間カレンダー</h2>
            <div class="calendar-header">
                <button class="btn btn-small" onclick="prevMonth()">◀ 先月</button>
                <h3 id="monthYearDisplay">2026年 7月</h3>
                <button class="btn btn-small" onclick="nextMonth()">来月 ▶</button>
            </div>
            <div id="calendarGrid" class="calendar-grid">
                </div>
        </div>

        <div class="card">
            <h2>📝 課題の追加・一覧</h2>
            <div>
                <select id="taskSubject">
                    <option value="">教科を選択 (任意)</option>
                </select>
                <input type="text" id="taskTitle" placeholder="課題名を入力 (例: レポート)">
                <input type="date" id="taskDate">
                <button class="btn" onclick="addTask()">課題を追加する</button>
            </div>
            <div id="taskListView"></div>
        </div>

        <div class="card">
            <h2>✏️ 自由なメモ</h2>
            <textarea id="memoArea" rows="10" placeholder="忘れたくないこと、日記など自由にどうぞ！" oninput="saveMemo()"></textarea>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. データ読み込み
        // ==========================================
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        document.getElementById('memoArea').value = localStorage.getItem('myMemo') || '';
        let timetableData = JSON.parse(localStorage.getItem('myTimetable')) || {};
        
        // カレンダー用の現在表示している年月データ
        let currentDate = new Date();

        // ==========================================
        // 2. 時間割の生成と保存
        // ==========================================
        const days = ['mon', 'tue', 'wed', 'thu', 'fri'];
        const periods = [1, 2, 3, 4, 5];
        const tbody = document.getElementById('timetableBody');

        periods.forEach(period => {
            let row = document.createElement('tr');
            let periodTh = document.createElement('th');
            periodTh.textContent = period;
            row.appendChild(periodTh);

            days.forEach(day => {
                let td = document.createElement('td');
                let cellId = `tt-${day}-${period}`;
                td.innerHTML = `<input type="text" id="${cellId}" placeholder=" " oninput="saveTimetable('${cellId}')">`;
                row.appendChild(td);
            });
            tbody.appendChild(row);
        });

        for (let cellId in timetableData) {
            let inputElement = document.getElementById(cellId);
            if (inputElement) inputElement.value = timetableData[cellId];
        }

        function saveTimetable(cellId) {
            timetableData[cellId] = document.getElementById(cellId).value;
            localStorage.setItem('myTimetable', JSON.stringify(timetableData));
            updateSubjectDropdown();
        }

        function updateSubjectDropdown() {
            const select = document.getElementById('taskSubject');
            select.innerHTML = '<option value="">教科を選択 (任意)</option>'; 
            let subjects = new Set();
            for (let key in timetableData) {
                let val = timetableData[key].trim();
                if (val !== "") subjects.add(val);
            }
            subjects.forEach(subject => {
                let option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                select.appendChild(option);
            });
        }
        updateSubjectDropdown();

        // ==========================================
        // 3. ★新規：月間カレンダーの生成
        // ==========================================
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('monthYearDisplay');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); // 0が1月, 11が12月
            
            display.textContent = `${year}年 ${month + 1}月`;
            grid.innerHTML = '';
            
            // 曜日のヘッダー作成
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            dayNames.forEach(d => {
                const head = document.createElement('div');
                head.className = 'cal-head';
                head.textContent = d;
                grid.appendChild(head);
            });
            
            // 月の最初の日が何曜日か、月の日数が何日かを取得
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // 1日の前の空白マスを埋める
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'cal-day cal-day-empty';
                grid.appendChild(empty);
            }
            
            // 日付のマスを作成
            for (let i = 1; i <= daysInMonth; i++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'cal-day';
                
                // 日付の数字
                const num = document.createElement('div');
                num.className = 'cal-date-num';
                num.textContent = i;
                dayCell.appendChild(num);
                
                // このマスの日付を YYYY-MM-DD 形式の文字列にする（課題データと比較するため）
                const mStr = String(month + 1).padStart(2, '0');
                const dStr = String(i).padStart(2, '0');
                const dateStr = `${year}-${mStr}-${dStr}`;
                
                // この日付に該当する課題を探してマスに追加
                const dayTasks = tasks.filter(t => t.date === dateStr);
                dayTasks.forEach(t => {
                    const label = document.createElement('div');
                    label.className = 'cal-task-label';
                    label.textContent = t.subject ? `${t.subject}: ${t.title}` : t.title;
                    label.title = t.title; // マウスを乗せると全文表示
                    dayCell.appendChild(label);
                });
                
                grid.appendChild(dayCell);
            }
        }

        // 先月・来月ボタンの処理
        function prevMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }
        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // ==========================================
        // 4. 課題管理と連動
        // ==========================================
        function addTask() {
            const subjectInput = document.getElementById('taskSubject');
            const titleInput = document.getElementById('taskTitle');
            const dateInput = document.getElementById('taskDate');
            
            if (!titleInput.value || !dateInput.value) {
                alert('課題名と締切日を入力してください！');
                return;
            }

            const newTask = {
                id: Date.now(),
                subject: subjectInput.value,
                title: titleInput.value,
                date: dateInput.value
            };

            tasks.push(newTask);
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
            renderCalendar(); // ★追加：課題を追加したらカレンダーも更新
            
            titleInput.value = '';
            dateInput.value = '';
            subjectInput.value = '';
        }

        function completeTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            localStorage.setItem('myTasks', JSON.stringify(tasks));
            renderTasks();
            renderCalendar(); // ★追加：課題を完了したらカレンダーも更新
        }

        function renderTasks() {
            const taskListView = document.getElementById('taskListView');
            taskListView.innerHTML = '';

            if (tasks.length === 0) {
                taskListView.innerHTML = '<p style="color:gray;">未完了の課題はありません。✨</p>';
                return;
            }

            const sortedTasks = tasks.sort((a, b) => new Date(a.date) - new Date(b.date));
            sortedTasks.forEach(task => {
                const subjectBadge = task.subject ? `<span class="subject-badge">${task.subject}</span>` : '';
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                taskItem.innerHTML = `
                    <span>
                        ${subjectBadge}<strong>${task.title}</strong><br>
                        <small style="color:#718096;">締切: ${task.date}</small>
                    </span>
                    <button class="btn-done" onclick="completeTask(${task.id})">完了</button>
                `;
                taskListView.appendChild(taskItem);
            });
        }

        // ==========================================
        // 5. メモの自動保存と初期実行
        // ==========================================
        function saveMemo() {
            localStorage.setItem('myMemo', document.getElementById('memoArea').value);
        }

        // 起動時にリストとカレンダーを描画
        renderTasks();
        renderCalendar();
    </script>
</body>
</html>
